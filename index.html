<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lecture Vault</h1>
        <div id="status" class="status-box">Connecting...</div>

        <div id="file-list" class="file-card" style="display: none;">
            <h3>Select Video</h3>
            <div id="buttons-container"></div>
        </div>

        <div id="player-container" style="display:none; margin-top:20px;">
            <div style="position:relative; padding-top:56.25%;">
                <iframe id="video-player" src="" frameborder="0" style="position:absolute;top:0;left:0;width:100%;height:100%;" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const RENDER_URL = "rr-zip-bot.onrender.com";
        let socket;

        function connect() {
            // "wss://" is mandatory for GitHub Pages
            socket = new WebSocket(`wss://${RENDER_URL}/ws`);

            socket.onopen = () => {
                document.getElementById('status').innerText = "✅ Connected";
                document.getElementById('status').style.background = "#28a745";
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "LIST_FILES") {
                    document.getElementById('file-list').style.display = 'block';
                    const container = document.getElementById('buttons-container');
                    container.innerHTML = "";
                    data.files.forEach(file => {
                        const btn = document.createElement('button');
                        btn.innerText = `Stream ${file}`;
                        btn.onclick = () => {
                            btn.innerText = "Processing...";
                            socket.send(JSON.stringify({type: "SELECT_FILE", filename: file, msg_id: data.msg_id}));
                        };
                        container.appendChild(btn);
                    });
                }
                if (data.type === "STREAM_READY") {
                    document.getElementById('video-player').src = `https://iframe.mediadelivery.net/embed/${data.library_id}/${data.video_id}?autoplay=true`;
                    document.getElementById('player-container').style.display = 'block';
                }
            };

            socket.onclose = () => {
                document.getElementById('status').innerText = "🔄 Reconnecting...";
                setTimeout(connect, 3000); // Try again in 3 seconds
            };
        }

        connect();
    </script>
</body>
</html>
