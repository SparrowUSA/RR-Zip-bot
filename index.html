<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Lecture Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lecture Vault</h1>
        <div id="status" class="status-box">Connecting to backend...</div>

        <div id="file-list" class="file-card" style="display: none;">
            <h3>Files in ZIP</h3>
            <div id="buttons-container"></div>
        </div>
    </div>

    <script>
        // Update this to your actual Render URL (without https://)
        const RENDER_DOMAIN = "rr-zip-bot.onrender.com";
        const socket = new WebSocket(`wss://${RENDER_DOMAIN}/ws`);
        const status = document.getElementById('status');
        const fileListDiv = document.getElementById('file-list');
        const buttonsContainer = document.getElementById('buttons-container');

        socket.onopen = () => {
            status.innerText = "✅ Connected. Forward a ZIP in Telegram!";
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === "LIST_FILES") {
                status.innerText = "ZIP Detected!";
                fileListDiv.style.display = 'block';
                buttonsContainer.innerHTML = ""; // Clear old list

                data.files.forEach(file => {
                    const btn = document.createElement('button');
                    btn.className = "stream-btn";
                    btn.style.marginTop = "10px";
                    btn.innerText = `Upload ${file}`;
                    
                    btn.onclick = () => {
                        btn.innerText = "⏳ Uploading to Bunny...";
                        btn.disabled = true;
                        socket.send(JSON.stringify({
                            type: "SELECT_FILE",
                            filename: file,
                            msg_id: data.msg_id
                        }));
                    };
                    buttonsContainer.appendChild(btn);
                });
            }
        };

        socket.onclose = () => {
            status.innerText = "❌ Connection lost. Refresh to reconnect.";
        };
    </script>
</body>
</html>
